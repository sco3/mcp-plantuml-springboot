spring:
  application:
    name: mcp-spring-ai

  ai:
    mcp:
      server:
        enabled: true
        protocol: STREAMABLE

        streamable-http:
          mcp-endpoint: /mcp
          keep-alive-interval: 30s

        annotation-scanner:
          enabled: true

        capabilities:
          tool: true
          resource: true
          prompt: true
          completion: true
